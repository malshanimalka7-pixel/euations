<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Life Challenge (Daily Tracker)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    select {
      display: block;
      margin: 10px auto;
      padding: 5px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .task {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }

    .task input {
      margin-right: 10px;
    }

    .total {
      text-align: center;
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    .progress {
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>Weekly Life Challenge</h1>
  <p style="text-align:center">Track your daily habits</p>

  <select id="daySelect" onchange="render()">
    <option>Monday</option>
    <option>Tuesday</option>
    <option>Wednesday</option>
    <option>Thursday</option>
    <option>Friday</option>
    <option>Saturday</option>
    <option>Sunday</option>
  </select>

  <div class="grid" id="tracker"></div>

  <div class="total" id="score">Score: 0</div>
  <div class="progress" id="progress"></div>

  <script>
    const data = {
      Physical: ["Workout", "Walk 7k+ steps", "Sleep 7+ hrs", "Eat healthy"],
      Mental: ["Journal 10 min", "Limit screen time", "Stay calm"],
      Social: ["Talk meaningfully", "Connect with someone"],
      Intellectual: ["Learn 30 min", "Apply knowledge"],
      Spiritual: ["Gratitude", "Reflect"]
    };

    let completed = {};

    function getKey(day, category, index) {
      return day + "_" + category + index;
    }

    function render() {
      const day = document.getElementById("daySelect").value;
      const tracker = document.getElementById("tracker");
      tracker.innerHTML = "";

      let score = 0;
      let totalTasks = 0;

      for (let category in data) {
        const card = document.createElement("div");
        card.className = "card";

        let tasksHTML = "";

        data[category].forEach((task, index) => {
          const key = getKey(day, category, index);

          if (!completed[key]) completed[key] = false;

          if (completed[key]) score++;
          totalTasks++;

          tasksHTML += `
            <div class="task">
              <input type="checkbox" ${completed[key] ? "checked" : ""}
                onchange="toggleTask('${key}')" />
              <label>${task}</label>
            </div>
          `;
        });

        card.innerHTML = `<h3>${category}</h3>${tasksHTML}`;
        tracker.appendChild(card);
      }

      document.getElementById("score").innerText = `Score Today: ${score}`;
      document.getElementById("progress").innerText = `Progress: ${Math.round((score/totalTasks)*100)}%`;
    }

    function toggleTask(key) {
      completed[key] = !completed[key];
      render();
    }

    render();
  </script>

</body>
</html>
